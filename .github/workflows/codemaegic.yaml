workflows:
  ios-altstore-build:
    name: Capacitor IPA Build

    environment:
      node: 22
      xcode: latest

    scripts:
      - name: Install npm packages
        script: |
          npm install

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Build archive
        script: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            archive \
            -archivePath build/App.xcarchive

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ios/App/ExportOptions.plist \
            -exportPath build

    artifacts:
      - build/**/*.ipa