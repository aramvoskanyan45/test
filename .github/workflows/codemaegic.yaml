workflows:
  ios-workflow:
    name: iOS Build

    environment:
      node: 22

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Capacitor Sync
        script: |
          npx cap sync ios

      - name: Build IPA
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          archive \
          -archivePath build/App.xcarchive

    artifacts:
      - build/**/*.ipa